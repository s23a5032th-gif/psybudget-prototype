<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>心理的価値の可視化</title>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <script type="module">
    // Firebaseの基本機能と、Realtime Database（リアルタイムデータベース）を読み込む
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    // あなた専用の接続鍵
    const firebaseConfig = {
      apiKey: "AIzaSyDhE0m-OTWeB4cQv-h7IHUIcYU_dB6q-kE",
      authDomain: "my-kakeibo-app-afe65.firebaseapp.com",
      databaseURL: "https://my-kakeibo-app-afe65-default-rtdb.firebaseio.com",
      projectId: "my-kakeibo-app-afe65",
      storageBucket: "my-kakeibo-app-afe65.firebasestorage.app",
      messagingSenderId: "190432317844",
      appId: "1:190432317844:web:fcd2c11f1c760eccdc3f81"
    };

    // Firebaseを初期化
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // 【重要】p5.js（sketch.js）側からこのデータベースを使えるように、ウィンドウ全体に共有する
    window.db = database;
    window.dbRef = ref;
    window.dbSet = set;
  </script>

  <script src="sketch.js"></script>
</body>
</html>
